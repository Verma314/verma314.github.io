<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>TheList — personal knowledge cockpit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="logo" title="TheList">📚 The<span>List</span></div>
    <div class="searchwrap">
      <input id="q" type="search" placeholder="Search everything…  ( / )" autocomplete="off">
      <select id="searchMode" title="search mode">
        <option value="both">smart</option>
        <option value="keyword">keyword</option>
        <option value="semantic">semantic</option>
      </select>
    </div>
    <div class="syncwrap" title="sync status">
      <span id="syncDot" class="sync-dot local"></span>
      <span id="syncLabel">local</span>
    </div>
    <button id="btnSettings" class="btn icon" title="settings">⚙️</button>
  </header>

  <nav class="tabs">
    <button data-view="inbox">📥 Inbox <span id="inboxCount" class="badge"></span></button>
    <button data-view="library">🗄 Library</button>
    <button data-view="queue">🎯 Queue <span id="queueCount" class="badge"></span></button>
    <button data-view="randoms">🎲 Randoms</button>
  </nav>

  <main id="view"></main>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/categorize.js"></script>
  <script src="js/search.js"></script>
  <script src="js/fetchers.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
